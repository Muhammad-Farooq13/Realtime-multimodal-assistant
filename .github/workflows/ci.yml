name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run ruff (lint)
        run: ruff check src/ tests/ scripts/

      - name: Run black (format check)
        run: black --check src/ tests/ scripts/

      - name: Run mypy (type check)
        run: mypy src/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (ffmpeg for audio)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml

      - name: Run integration tests
        env:
          OPENAI_API_KEY: test-key-for-ci
          WHISPER_MODEL_SIZE: tiny
          METRICS_ENABLED: "false"
        run: pytest tests/integration/ -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg WHISPER_MODEL_SIZE=tiny \
            -t multimodal-assistant:ci \
            .

      - name: Smoke test container
        run: |
          docker run -d \
            --name smoke-test \
            -p 8000:8000 \
            -e OPENAI_API_KEY=test \
            -e WHISPER_MODEL_SIZE=tiny \
            -e METRICS_ENABLED=false \
            multimodal-assistant:ci
          sleep 20
          curl --fail http://localhost:8000/health
          docker stop smoke-test
